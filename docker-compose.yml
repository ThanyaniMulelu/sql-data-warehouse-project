x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-airflow}
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES:-False}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-change_me}
    MSSQL_HOST: mssql
    MSSQL_PORT: "1433"
    MSSQL_USER: sa
    MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    mssql:
      condition: service_healthy

services:
  # ── Airflow Metadata Database ──
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SQL Server (Data Warehouse) ──
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID:-Developer}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./datasets:/var/opt/mssql/datasets:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${MSSQL_SA_PASSWORD}\" -Q 'SELECT 1' -C -b"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g

  # ── Airflow Init (one-shot: migrate DB + create admin user) ──
  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username $${_AIRFLOW_WWW_USER_USERNAME:-airflow} \
          --password $${_AIRFLOW_WWW_USER_PASSWORD:-airflow} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  # ── Airflow Webserver ──
  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ──
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Apache Superset (Visualization) ──
  superset:
    image: apache/superset:3.1.3
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-superset_secret_key_change_me}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/superset
      SUPERSET_LOAD_EXAMPLES: "no"
    volumes:
      - ./superset:/app/docker/superset
      - superset_home:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
      mssql:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        # Create superset metadata DB in Postgres
        pip install pymssql > /dev/null 2>&1
        PGPASSWORD=$${POSTGRES_PASSWORD:-airflow} psql -h postgres -U $${POSTGRES_USER:-airflow} -tc "SELECT 1 FROM pg_database WHERE datname='superset'" | grep -q 1 || \
          PGPASSWORD=$${POSTGRES_PASSWORD:-airflow} psql -h postgres -U $${POSTGRES_USER:-airflow} -c "CREATE DATABASE superset"
        superset db upgrade
        superset fab create-admin \
          --username admin \
          --firstname Admin \
          --lastname User \
          --email admin@example.com \
          --password admin || true
        superset init
        # Register SQL Server data source
        superset import-datasources -p /app/docker/superset/datasources.yaml || true
        superset run -h 0.0.0.0 -p 8088 --with-threads

volumes:
  postgres_data:
  mssql_data:
  superset_home:
